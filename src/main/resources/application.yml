spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
      hibernate:
        ddl-auto: validate
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


app:
  jwt:
    secret: ${JWT_SECRET:your-very-long-secret-key-change-this-in-production}
    expiration-ms: ${JWT_EXPIRATION:86400000}

server:
  port: 8080